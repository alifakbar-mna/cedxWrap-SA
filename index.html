<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Development Snapshot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index-style.css">
</head>
<body>

    <div class="mobile-container">
        <div class="ticket-card">
            
            <div class="ticket-header">
                <div class="rotating-gradient"></div>
                <div class="header-content">
                    <p class="journey-text">YOUR 2025 JOURNEY</p>
                    <h1 class="main-title">
                        <span>STUDENT</span>
                        <span>DEVELOPMENT</span>
                        <span>SNAPSHOT</span>
                    </h1>
                </div>
            </div>
            
            <div class="ticket-divider">
                <div class="notch notch-left"></div>
                <div class="dashed-line"></div>
                <div class="notch notch-right"></div>
            </div>
            
            <div class="ticket-body">
                <div class="avatar-container">
                    <div class="avatar-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#8E9AA6" width="48" height="48">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                </div>
                
                <p class="label-text">STUDENT NAME</p>
                <h2 class="student-name">ALEXANDER WIJAYA</h2>
                
                <div class="horizontal-line"></div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <p class="label-text">ID (NIM)</p>
                        <p class="value-text bold-text">0706012110023</p>
                    </div>
                    <div class="info-item-right">
                        <p class="label-text">STATUS</p>
                        <span class="status-badge">SEMESTER 5</span>
                    </div>
                </div>
                
                <div class="horizontal-line thin-line"></div>
                
                <div class="barcode-container">
                    <div class="fake-barcode"></div>
                    <p class="barcode-footer">ADMIT ONE &bull; WRAP 2025</p>
                </div>
            </div>
        </div>
        
        <button class="btn-snapshot">
            <a href="view/startPage.html" class="btn-snapshot">
            OPEN MY SNAPSHOT 
            <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </a>
        </button>
    </div>

</body>
</html>
