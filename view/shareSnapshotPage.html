<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Snapshot - Your 2025 Wrap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/shareSnapshotPage-style.css">
</head>
<body>

    <div class="mobile-container">
        
        <header class="page-header">
            <p class="subtitle">YOUR 2025 WRAP</p>
            <h1 class="main-title">SHARE YOUR SNAPSHOT</h1>
        </header>

        <main class="share-container">
            
            <a href="finalCheckpointPage.html" class="floating-btn-back" aria-label="Go Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="back-arrow-icon">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>

            <!-- Elemen ini (.poster-card-frame) yang akan ditargetkan untuk didownload sesuai Screenshot 2026-06-05 at 10.47.55.jpg -->
            <div class="poster-card-frame" id="poster-to-download">
                
                <div class="poster-canvas">
                    <p class="archetype-label">ARCHETYPE</p>
                    <h2 class="archetype-title">THE<br>COLLABORATIVE<br>CONNECTOR</h2>
                </div>

                <div class="stats-grid-row">
                    <div class="stat-box-white">
                        <span class="stat-number-dark">42</span>
                        <span class="stat-label-dark">ACTIVITIES</span>
                    </div>
                    <div class="stat-box-green">
                        <span class="stat-number-dark">+18%</span>
                        <span class="stat-label-dark">GROWTH</span>
                    </div>
                </div>

                <div class="poster-brand-footer">
                    <span class="brand-left">UC STUDENT DEVELOPMENT</span>
                    <span class="brand-right">#UCWrapped</span>
                </div>

            </div>

        </main>

        <footer class="action-footer">
            <!-- Menambahkan id untuk memicu fungsi klik di JavaScript -->
            <button type="button" class="btn-save-poster" id="download-btn">
                <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>SAVE POSTER</span>
            </button>
        </footer>
        
    </div>

    <!-- 1. Memanggil Library html2canvas via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- 2. Skrip Logic Eksekusi Download Gambar -->
    <script>
        document.getElementById('download-btn').addEventListener('click', function () {
            // Targetkan hanya area bingkai putih poster saja
            const posterElement = document.getElementById('poster-to-download');

            // Konfigurasi html2canvas agar hasil render jernih dan beresolusi tinggi (HD)
            const options = {
                scale: 3,            // Menaikkan resolusi gambar 3x lipat agar tidak pecah/blur
                useCORS: true,       // Mengaktifkan izin lintas asal jika ada aset gambar eksternal
                backgroundColor: null // Menjaga agar background di luar border-radius tetap transparan
            };

            // Mengubah elemen HTML menjadi Canvas, lalu otomatis mendownloadnya
            html2canvas(posterElement, options).then(function (canvas) {
                // Mengonversi hasil canvas menjadi URL gambar PNG
                const imageURl = canvas.toDataURL('image/png');
                
                // Membuat elemen anchor bayangan (sementara) di memori browser
                const createDataAnchor = document.createElement('a');
                createDataAnchor.href = imageURl;
                
                // Menentukan nama file hasil download saat disimpan oleh user
                createDataAnchor.download = 'UC_Wrapped_Snapshot_2025.png';
                
                // Memicu trigger klik otomatis untuk memulai proses unduhan
                createDataAnchor.click();
            });
        });
    </script>

</body>
</html>
