<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Semester Highlights - Student Development Snapshot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <div class="mobile-container">
        
        <!-- Header Atas -->
        <header class="page-header">
            <p class="subtitle">THE SETLIST</p>
            <h1 class="main-title">SEMESTER HIGHLIGHTS</h1>
        </header>

        <!-- Daftar Kartu Highlights Kegiatan -->
        <main class="highlights-list">
            
            <!-- Item 1: Workshop -->
            <div class="highlight-item">
                <div class="status-indicator"></div>
                <div class="highlight-card">
                    <div class="card-content">
                        <span class="badge badge-workshop">
                            <span class="tag-icon">🏷</span> WORKSHOP
                        </span>
                        <h3 class="activity-title">ADVANCED BRANDING WORKSHOP</h3>
                    </div>
                    <div class="points-box">
                        <span class="pts-number">15</span>
                        <span class="pts-label">PTS</span>
                    </div>
                </div>
            </div>

            <!-- Item 2: Seminar (Contoh tampilan ter-hover / terisi bawaan di gambar) -->
            <div class="highlight-item">
                <div class="status-indicator"></div>
                <div class="highlight-card">
                    <div class="card-content">
                        <span class="badge badge-seminar">
                            <span class="tag-icon">🏷</span> SEMINAR
                        </span>
                        <h3 class="activity-title">INTL. DESIGN SEMINAR 2024</h3>
                    </div>
                    <div class="points-box">
                        <span class="pts-number">10</span>
                        <span class="pts-label">PTS</span>

                </div>
            </div>

            <!-- Item 3: Camp -->
            <div class="highlight-item">
                <div class="status-indicator"></div>
                <div class="highlight-card">
                    <div class="card-content">
                        <span class="badge badge-camp">
                            <span class="tag-icon">🏷</span> CAMP
                        </span>
                        <h3 class="activity-title">LEADERSHIP CAMP: GEN Z</h3>
                    </div>
                    <div class="points-box">
                        <span class="pts-number">25</span>
                        <span class="pts-label">PTS</span>
                    </div>
                </div>
            </div>

            <!-- Item 4: Social -->
            <div class="highlight-item">
                <div class="status-indicator"></div>
                <div class="highlight-card">
                    <div class="card-content">
                        <span class="badge badge-social">
                            <span class="tag-icon">🏷</span> SOCIAL
                        </span>
                        <h3 class="activity-title">COMMUNITY SERVICE: ART VILLAGE</h3>
                    </div>
                    <div class="points-box">
                        <span class="pts-number">20</span>
                        <span class="pts-label">PTS</span>
                    </div>
                </div>
            </div>

            <!-- Item 5: Competition -->
            <div class="highlight-item">
                <div class="status-indicator"></div>
                <div class="highlight-card">
                    <div class="card-content">
                        <span class="badge badge-competition">
                            <span class="tag-icon">🏷</span> COMPETITION
                        </span>
                        <h3 class="activity-title">PORTFOLIO REVIEW DAY</h3>
                    </div>
                    <div class="points-box">
                        <span class="pts-number">15</span>
                        <span class="pts-label">PTS</span>
                    </div>
                </div>
            </div>

        </main>

        <!-- Footer Navigasi Bawah (Back, Pagination Dots, Next Button) -->
        <footer class="navigation-footer">
            <!-- Tombol Kembali menuju totalActivityPage.html -->
            <a href="totalActivityPage.html" class="btn-back">BACK</a>
