<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause & Reflect - Final Checkpoint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/finalCheckpointPage-style.css">
</head>
<body>

    <div class="mobile-container">
        
        <header class="page-header">
            <p class="subtitle">PAUSE & REFLECT</p>
            <h1 class="main-title">FINAL CHECKPOINT</h1>
        </header>

        <main class="checkpoint-container">
            
            <div class="pencil-icon-wrapper">
                <svg class="pencil-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </div>

            <h2 class="question-text" id="random-question">"What would you name as the core learning of this semester?"</h2>

            <div class="textarea-container">
                <textarea class="reflection-input" placeholder="Write your thoughts..." rows="8"></textarea>
                
                <button type="button" class="btn-lock-in">LOCK IN</button>
            </div>

        </main>

        <footer class="navigation-footer">
            <a href="headOfProgramPage.html" class="btn-back">BACK</a>
            
            <div class="pagination-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot active"></span> 
                <span class="dot"></span>
            </div>

            <a href="../view/shareSnapshotPage.html" class="btn-next" aria-label="Next Page">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="arrow-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </footer>
        
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Kumpulan pertanyaan refleksi (Duplikasi telah dihapus)
            const questions = [
                "Six months from now, what would you like to do?",
                "What kind of impact do you want to continue or deepen?",
                "What challenged you in a way that helped you grow?",
                "Which activities felt aligned with how you want to grow?",
                "Where did you step outside your comfort zone, even briefly?",
                "What did you learn from situations that did not go as expected?",
                "What experiences reflected what matters most to you right now?",
                "When did you feel that your contribution mattered?",
                "What did you learn about working with different people or perspectives?",
                "What roles or responsibilities felt most aligned with your values?",
                "What patterns did you notice in how you approached challenges?",
                "What lessons from this semester feel worth carrying forward?",
                "What small, realistic step are you willing to commit to trying?",
                "What does a meaningful next semester look like for you personally?",
                "What is one capability you want to rely on more confidently?",
                "Where did preparation help you, and where did adaptability matter more?",
                "At the end of next semester, what evidence would tell you that you moved forward?",
                "What would you name as the core learning of this semester?",
                "What would progress look like in a realistic, personal sense?"
            ];

            // Mengambil satu indeks acak dari array
            const randomIndex = Math.floor(Math.random() * questions.length);
            
            // Memilih pertanyaan berdasarkan indeks acak tersebut
            const chosenQuestion = questions[randomIndex];

            // Menampilkan pertanyaan ke dalam elemen HTML dengan tanda petik pembungkus
            document.getElementById("random-question").innerText = `"${chosenQuestion}"`;
        });
    </script>

</body>
</html>
